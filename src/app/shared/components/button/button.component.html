@if (!routerLink) {
  <button
    [type]="type"
    [ngClass]="[
      'button',
      buttonClass,
      prioClass,
      isPrioButton && isPrioActive ? 'active' : '',
    ]"
    [style.width]="width"
    [style.height]="height"
    [style.padding]="padding"
    [title]="tooltip"
    [disabled]="disabled"
    (click)="onClick($event)"
  >
    @switch (true) {
      @case (buttonCaptionFirst && buttonIcon && isPrioButton) {
        <div class="caption-image-wrapper prio-button">
          <span class="bold_600">{{ caption }}</span>
          <img
            [class]="imgClass"
            [src]="iconSrc"
            [alt]="alt"
          />
        </div>
      }
      @case (buttonCaptionFirst && buttonIcon) {
        <div class="caption-image-wrapper">
          <div class="inner-caption-image-wrapper">
            <span class="bold_600">{{ caption }}</span>
            <img [class]="imgClass" [src]="safeImgSrc" [alt]="alt" />
          </div>
        </div>
      }
      @case (buttonCaptionSecond && buttonIcon) {
        <div class="inner-caption-image-wrapper">
          <img [src]="safeImgSrc" [class]="imgClass" [alt]="alt" />
          <span>{{ caption }}</span>
        </div>
      }
      @case (buttonIcon) {
        <img class="button-icon" [src]="safeImgSrc" [alt]="alt" />
      }
      @default {
        <span>{{ caption }}</span>
      }
    }
  </button>
} @else {
  <button
    [routerLink]="routerLink"
    [ngClass]="['button', buttonClass]"
    [style.width]="width"
    [style.height]="height"
    [style.padding]="padding"
    [title]="tooltip"
  >
    @switch (true) {
      @case (buttonCaptionFirst && buttonIcon) {
        {{ caption }} <img [src]="safeImgSrc" [alt]="alt" />
      }
      @case (buttonCaptionSecond && buttonIcon) {
        <img [src]="safeImgSrc" [alt]="alt" /> {{ caption }}
      }
      @case (buttonIcon) {
        <img [src]="safeImgSrc" [alt]="alt" />
      }
      @default {
        {{ caption }}
      }
    }
  </button>
}
